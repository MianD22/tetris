<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>8-Player Tetris</title>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="audio-controls" aria-label="Audio controls">
            <label class="volume-control" for="sfx-volume">
                <span>SFX</span>
                <input
                    id="sfx-volume"
                    type="range"
                    min="0"
                    max="100"
                    value="70"
                />
            </label>
            <label class="volume-control" for="music-volume">
                <span>Music</span>
                <input
                    id="music-volume"
                    type="range"
                    min="0"
                    max="100"
                    value="35"
                />
            </label>
        </div>

        <div class="game-container">
            <div class="sidebar left-sidebar">
                <div class="score-container">
                    <h2>Lines</h2>
                    <p id="score">0</p>
                </div>
                <div class="controls-info">
                    <h3 id="p1-controls-header">P1 Controls</h3>
                    <p
                        id="rebind-inst"
                        style="
                            font-size: 0.8rem;
                            color: var(--text-secondary);
                            margin-bottom: 8px;
                            display: none;
                        "
                    >
                        Press any key to rebind...
                    </p>
                    <ul id="controls-list-p1">
                        <li>
                            <button
                                class="rebind-action-btn"
                                data-player="1"
                                data-action="left"
                                style="
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                    color: inherit;
                                    font-family: inherit;
                                    display: flex;
                                    align-items: center;
                                    gap: 8px;
                                "
                            >
                                <span class="key" id="key-p1-left">KeyA</span>
                                <span>Move L</span>
                            </button>
                        </li>
                        <li>
                            <button
                                class="rebind-action-btn"
                                data-player="1"
                                data-action="right"
                                style="
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                    color: inherit;
                                    font-family: inherit;
                                    display: flex;
                                    align-items: center;
                                    gap: 8px;
                                "
                            >
                                <span class="key" id="key-p1-right">KeyD</span>
                                <span>Move R</span>
                            </button>
                        </li>
                        <li>
                            <button
                                class="rebind-action-btn"
                                data-player="1"
                                data-action="rotate"
                                style="
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                    color: inherit;
                                    font-family: inherit;
                                    display: flex;
                                    align-items: center;
                                    gap: 8px;
                                "
                            >
                                <span class="key" id="key-p1-rotate"
                                    >Space</span
                                >
                                <span>Rotate</span>
                            </button>
                        </li>
                        <li>
                            <button
                                class="rebind-action-btn"
                                data-player="1"
                                data-action="drop"
                                style="
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                    color: inherit;
                                    font-family: inherit;
                                    display: flex;
                                    align-items: center;
                                    gap: 8px;
                                "
                            >
                                <span class="key" id="key-p1-drop">KeyS</span>
                                <span>Drop</span>
                            </button>
                        </li>
                    </ul>

                    <div
                        id="p2-controls-container"
                        style="
                            display: none;
                            margin-top: 15px;
                            border-top: 1px solid var(--border-color);
                            padding-top: 15px;
                        "
                    >
                        <h3>P2 Controls</h3>
                        <ul id="controls-list-p2">
                            <li>
                                <button
                                    class="rebind-action-btn"
                                    data-player="2"
                                    data-action="left"
                                    style="
                                        background: none;
                                        border: none;
                                        padding: 0;
                                        cursor: pointer;
                                        color: inherit;
                                        font-family: inherit;
                                        display: flex;
                                        align-items: center;
                                        gap: 8px;
                                    "
                                >
                                    <span class="key" id="key-p2-left"
                                        >ArrowLeft</span
                                    >
                                    <span>Move L</span>
                                </button>
                            </li>
                            <li>
                                <button
                                    class="rebind-action-btn"
                                    data-player="2"
                                    data-action="right"
                                    style="
                                        background: none;
                                        border: none;
                                        padding: 0;
                                        cursor: pointer;
                                        color: inherit;
                                        font-family: inherit;
                                        display: flex;
                                        align-items: center;
                                        gap: 8px;
                                    "
                                >
                                    <span class="key" id="key-p2-right"
                                        >ArrowRight</span
                                    >
                                    <span>Move R</span>
                                </button>
                            </li>
                            <li>
                                <button
                                    class="rebind-action-btn"
                                    data-player="2"
                                    data-action="rotate"
                                    style="
                                        background: none;
                                        border: none;
                                        padding: 0;
                                        cursor: pointer;
                                        color: inherit;
                                        font-family: inherit;
                                        display: flex;
                                        align-items: center;
                                        gap: 8px;
                                    "
                                >
                                    <span class="key" id="key-p2-rotate"
                                        >ArrowUp</span
                                    >
                                    <span>Rotate</span>
                                </button>
                            </li>
                            <li>
                                <button
                                    class="rebind-action-btn"
                                    data-player="2"
                                    data-action="drop"
                                    style="
                                        background: none;
                                        border: none;
                                        padding: 0;
                                        cursor: pointer;
                                        color: inherit;
                                        font-family: inherit;
                                        display: flex;
                                        align-items: center;
                                        gap: 8px;
                                    "
                                >
                                    <span class="key" id="key-p2-drop"
                                        >ArrowDown</span
                                    >
                                    <span>Drop</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="board-container">
                <canvas id="tetris" width="300" height="600"></canvas>

                <div id="connection-screen" class="overlay">
                    <h2 id="connection-status">Connecting to server...</h2>
                </div>

                <div id="lobby-screen" class="overlay hidden">
                    <h2>Game Lobby</h2>
                    <div
                        class="lobby-options"
                        style="
                            margin-bottom: 20px;
                            display: flex;
                            align-items: center;
                            gap: 10px;
                        "
                    >
                        <label for="speed-select" style="font-size: 1.1rem"
                            >Starting Speed:</label
                        >
                        <select
                            id="speed-select"
                            style="
                                padding: 5px 10px;
                                border-radius: 5px;
                                background: rgba(0, 0, 0, 0.5);
                                color: white;
                                border: 1px solid var(--border-color);
                            "
                        >
                            <option value="0">0</option>
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                            <option value="60">60</option>
                            <option value="70">70</option>
                            <option value="80">80</option>
                            <option value="90">90</option>
                        </select>

                        <label
                            class="checkbox-container"
                            style="
                                display: flex;
                                align-items: center;
                                gap: 8px;
                                cursor: pointer;
                                margin-left: 10px;
                            "
                        >
                            <input
                                type="checkbox"
                                id="random-mode-checkbox"
                                style="
                                    width: 18px;
                                    height: 18px;
                                    cursor: pointer;
                                "
                            />
                            <span style="font-size: 1.1rem">Random</span>
                        </label>

                        <label
                            class="checkbox-container"
                            style="
                                display: flex;
                                align-items: center;
                                gap: 8px;
                                cursor: pointer;
                                margin-left: 10px;
                            "
                        >
                            <input
                                type="checkbox"
                                id="splitscreen-checkbox"
                                style="
                                    width: 18px;
                                    height: 18px;
                                    cursor: pointer;
                                "
                            />
                            <span style="font-size: 1.1rem">Splitscreen</span>
                        </label>
                    </div>
                    <div class="mode-picker" aria-label="Game mode">
                        <button
                            type="button"
                            id="co-op-mode-btn"
                            class="mode-btn co-op selected"
                        >
                            Co-op
                        </button>
                        <button
                            type="button"
                            id="battle-mode-btn"
                            class="mode-btn battle"
                        >
                            Battle
                        </button>
                    </div>
                    <p id="lobby-status">Pick your color</p>
                    <div class="color-picker" id="color-picker">
                        <!-- Color buttons generated by JS -->
                    </div>
                    <button id="ready-btn" disabled>Ready up!</button>
                </div>

                <div id="game-over-screen" class="overlay hidden">
                    <h2
                        style="
                            color: #ef4444;
                            font-size: 3rem;
                            margin-bottom: 10px;
                            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
                        "
                    >
                        GAME OVER
                    </h2>
                    <p>The pieces reached the top!</p>
                    <button id="return-lobby-btn" style="margin-top: 20px">
                        Return to Lobby
                    </button>
                </div>
            </div>

            <div class="sidebar right-sidebar">
                <div class="next-piece-container">
                    <h2>Next</h2>
                    <canvas id="next-piece" width="120" height="120"></canvas>
                </div>
                <div id="players-list-container">
                    <h3>Players</h3>
                    <ul id="players-list"></ul>
                </div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="main.js"></script>
    </body>
</html>
